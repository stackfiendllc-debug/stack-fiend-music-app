<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Fiend Music</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <img src="logo1.png" class="logo" />

    <h1>Stack Fiend Music</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="signup-btn">Sign Up</button>
    <button id="login-btn">Login</button>
    <button id="google-login">Continue with Google</button>
  </div>

  <!-- PROFILE SCREEN -->
  <div id="profile-screen" class="screen hidden">
    <img src="logo1.png" class="logo" />

    <h2>Create Profile</h2>

    <input type="text" id="fullname" placeholder="Full Name" />

    <select id="role">
      <option value="listener">Listener</option>
      <option value="artist">Artist</option>
    </select>

    <button id="create-profile-btn">Create Profile</button>
  </div>

  <!-- MUSIC HOME -->
  <div id="music-screen" class="screen hidden">
    <img src="logo1.png" class="logo-small" />

    <h2>Music Feed</h2>

    <div class="feed">
      <div class="track-card">🔥 Trending Track</div>
      <div class="track-card">🎵 New Artist Upload</div>
      <div class="track-card">⭐ Featured Release</div>
    </div>

    <button id="account-btn">Account</button>
  </div>

  <!-- ACCOUNT SCREEN -->
  <div id="account-screen" class="screen hidden">
    <img src="logo1.png" class="logo-small" />

    <h2>Account</h2>

    <p>Name: <span id="account-name"></span></p>
    <p>Email: <span id="account-email"></span></p>
    <p>Role: <span id="account-role"></span></p>

    <button id="home-btn">Home</button>
    <button id="signout-btn">Sign Out</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
