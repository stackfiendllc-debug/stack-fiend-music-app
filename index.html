<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Fiend Music</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <img src="logo.jpeg" class="logo" alt="Stack Fiend Logo">

      <h1>Stack Fiend Music</h1>

      <input id="login-email" type="email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">

      <button id="login-btn" class="primary-btn">Login</button>
      <button id="create-account-btn" class="primary-btn">Create Account</button>

      <button id="google-login" class="oauth-btn">Sign in with Google</button>
      <button id="apple-login" class="oauth-btn disabled">Apple (Coming Soon)</button>
      <button id="phone-login" class="oauth-btn">Phone Login</button>
    </div>
  </div>

  <!-- SIGNUP SCREEN -->
  <div id="signup-screen" class="screen">
    <div class="auth-container">
      <h2>Create Profile</h2>

      <input id="signup-name" type="text" placeholder="Full Name">
      <input id="signup-email" type="email" placeholder="Email">
      <input id="signup-password" type="password" placeholder="Strong Password">

      <div class="role-select">
        <label class="role-option">
          <input type="radio" name="role" value="listener">
          Listener
        </label>

        <label class="role-option">
          <input type="radio" name="role" value="artist">
          Artist
        </label>
      </div>

      <button id="signup-submit" class="primary-btn">Create Profile</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen" class="screen">
    <div class="dashboard">
      <img src="logo.jpeg" class="logo">

      <h1>Welcome to Stack Fiend Music</h1>
      <p>Exclusive artist content unlocked.</p>
    </div>
  </div>

  <script type="module" src="supabase.js?v=5"></script>
  <script type="module" src="app.js?v=5"></script>

</body>
</html>
