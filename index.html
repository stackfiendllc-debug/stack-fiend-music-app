<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Fiend Music</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="container">

  <header>
    <img src="logo1.png" class="logo" alt="Stack Fiend Logo">
    <h1>STACK FIEND MUSIC</h1>
    <p class="tagline">Independent Sound. Real Artists. Real Movement.</p>
  </header>

  <!-- LOGIN SCREEN -->
  <section id="auth-section">
    <h2>Enter The Platform</h2>

    <input type="email" id="email" placeholder="Email Address" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="showSignupForm()">Create Account</button>
    <button onclick="signIn()">Login</button>
  </section>

  <!-- SIGNUP DETAILS -->
  <section id="signup-details" class="hidden">
    <h2>Create Your Profile</h2>

    <input type="text" id="fullName" placeholder="Full Name" />
    <input type="text" id="username" placeholder="Username" />

    <select id="role">
      <option value="listener">Listener</option>
      <option value="artist">Artist</option>
    </select>

    <button onclick="completeSignup()">Complete Signup</button>
  </section>

  <!-- UPLOAD SECTION -->
  <section id="upload-section" class="hidden">
    <h2>Upload Your Music</h2>

    <input type="text" id="trackTitle" placeholder="Track Title" />
    <input type="file" id="musicFile" accept="audio/*" />

    <button onclick="uploadTrack()">Upload Track</button>
  </section>

  <!-- MUSIC FEED -->
  <section id="tracks-section" class="hidden">
    <h2>Stack Fiend Catalog</h2>
    <div id="trackList"></div>
  </section>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
