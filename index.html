<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack Fiend Music</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="container">

<header>
  <img src="logo1.png" class="logo">
  <h1>STACK FIEND MUSIC</h1>
</header>

<section id="auth-section">
  <input type="email" id="email" placeholder="Email">

  <input type="password" id="password"
    placeholder="Strong Password">

  <button onclick="showSignupForm()">Create Account</button>
  <button onclick="signIn()">Login</button>

  <button onclick="googleLogin()">Google Login</button>
  <button onclick="appleLogin()">Apple Login</button>
</section>

<section id="signup-details" class="hidden">
  <input type="text" id="fullName" placeholder="Full Name">
  <input type="text" id="username" placeholder="Username">

  <input type="file" id="profileImage" accept="image/*">

  <button onclick="selectRole('listener')">Listener</button>
  <button onclick="selectRole('artist')">Stack Fiend Artist</button>

  <button onclick="completeSignup()">Confirm Signup</button>
</section>

<section id="upload-section" class="hidden">
  <input type="text" id="trackTitle" placeholder="Track Title">
  <input type="file" id="musicFile" accept="audio/*">
  <button onclick="uploadTrack()">Upload</button>
</section>

<section id="tracks-section" class="hidden">
  <div id="trackList"></div>
</section>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
