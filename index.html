<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Fiend Music</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="background-glow"></div>

<div class="auth-container" id="auth-screen">
  <img src="logo1.png" class="logo" />
  <h1>STACK FIEND</h1>

  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button id="signup-btn">Create Account</button>
  <button id="login-btn">Login</button>

  <div class="social-buttons">
    <button id="google-login">Continue with Google</button>
    <button id="apple-login">Apple (Coming Soon)</button>
  </div>
</div>

<div id="profile-screen" class="hidden auth-container">
  <img src="logo1.png" class="logo" />
  <h2>Create Profile</h2>

  <input type="text" id="fullname" placeholder="Full Name" />
  
  <select id="role">
    <option value="listener">Listener</option>
    <option value="artist">Stack Fiend Artist</option>
  </select>

  <input type="file" id="profile-pic" />

  <button id="create-profile-btn">Create Profile</button>
</div>

<div id="music-screen" class="hidden">
  <header class="music-header">
    <img src="logo1.png" class="mini-logo" />
    <button id="signout-btn">Sign Out</button>
  </header>

  <h2>Welcome to Stack Fiend Music</h2>
  <p>Exclusive content unlocked.</p>

  <div id="artist-tools" class="hidden">
    <h3>Artist Upload Portal</h3>
    <input type="file" id="track-upload" accept="audio/*" />
    <input type="text" id="track-title" placeholder="Track Title" />
    <button id="upload-track-btn">Upload Track</button>
  </div>

  <div class="music-sections">
    <div class="section-card">
      <h3>🔥 Trending Tracks</h3>
      <div id="trending-list"></div>
    </div>

    <div class="section-card">
      <h3>⭐ Featured Releases</h3>
      <div id="featured-list"></div>
    </div>
  </div>
</div>

<script type="module" src="supabase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
